<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Virtual AOMA | Asociación Obrera Minera Argentina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <!-- HEADER -->
    <header class="header" id="mainHeader" style="display:none;">
        <div class="header-container">
            <div class="header-left">
                <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                <div class="brand" onclick="navigateTo('inicio')" style="cursor:pointer;">
                    <div class="brand-icon"><img src="assets/logo-aoma.png" alt="AOMA" /></div>
                    <div class="brand-text"><h1>AOMA San Juan</h1><span>Campus Virtual</span></div>
                </div>
            </div>
            <nav class="nav-pills" id="navPills">
                <button class="nav-pill active" data-page="inicio"><i class="fas fa-home"></i> Inicio</button>
                <button class="nav-pill" data-page="cursos"><i class="fas fa-graduation-cap"></i> Capacitaciones</button>
                <button class="nav-pill" data-page="beneficios"><i class="fas fa-gift"></i> Beneficios</button>
                <button class="nav-pill" data-page="convenios"><i class="fas fa-file-contract"></i> Convenios</button>
                <button class="nav-pill" data-page="legislacion"><i class="fas fa-balance-scale"></i> Legislación</button>
                <button class="nav-pill" data-page="gremio"><i class="fas fa-users"></i> El Gremio</button>
            </nav>
            <div class="header-right">
                <button class="icon-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
                <div class="user-menu" id="userMenu">
                    <div class="user-info"><span class="user-name" id="userName">Usuario</span><span class="user-role" id="userRole">Rol</span></div>
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="#" class="dropdown-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- MOBILE MENU -->
    <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-menu-header"><span class="mobile-menu-title">Menú</span><button class="mobile-menu-close" id="mobileMenuClose"><i class="fas fa-times"></i></button></div>
        <div class="mobile-menu-section">
            <button class="mobile-nav-pill active" data-page="inicio"><i class="fas fa-home"></i> Inicio</button>
            <button class="mobile-nav-pill" data-page="cursos"><i class="fas fa-graduation-cap"></i> Capacitaciones</button>
            <button class="mobile-nav-pill" data-page="beneficios"><i class="fas fa-gift"></i> Beneficios</button>
            <button class="mobile-nav-pill" data-page="convenios"><i class="fas fa-file-contract"></i> Convenios</button>
            <button class="mobile-nav-pill" data-page="legislacion"><i class="fas fa-balance-scale"></i> Legislación</button>
            <button class="mobile-nav-pill" data-page="gremio"><i class="fas fa-users"></i> El Gremio</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent" style="display:none;">
        <div id="pageContent"></div>
    </main>

    <!-- LOGIN OVERLAY -->
    <div id="loginOverlay" style="position:fixed; inset:0; background:linear-gradient(135deg,#1a1a1a 0%,#333333 100%); z-index:2000; display:flex; align-items:center; justify-content:center; padding:1rem;">
        <div style="background:white; padding:2.5rem; border-radius:16px; box-shadow:0 20px 25px rgba(0,0,0,0.15); width:100%; max-width:420px;">
            <div style="text-align:center; margin-bottom:2rem;">
                <div style="width:70px; height:70px; background:linear-gradient(135deg,#f47b20,#f69b4c); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:2rem; color:white; margin:0 auto 1rem;">
                    <i class="fas fa-mountain"></i>
                </div>
                <h1 style="font-size:1.5rem; color:#1a1a1a; margin-bottom:0.5rem;">Campus Virtual AOMA</h1>
                <p style="color:#6b7280; font-size:0.875rem;">Asociación Obrera Minera Argentina<br>Seccional San Juan</p>
            </div>
            <form id="loginForm">
                <div style="margin-bottom:1.25rem;">
                    <label style="display:block; font-weight:600; font-size:0.875rem; color:#1a1a1a; margin-bottom:0.25rem;"><i class="fas fa-user" style="color:#f47b20;"></i> Usuario</label>
                    <input type="text" id="username" style="width:100%; padding:0.75rem 1rem; background:#f9fafb; border:2px solid #e5e7eb; border-radius:8px; font-size:1rem;" placeholder="Ingresá tu usuario" required>
                </div>
                <div style="margin-bottom:1.5rem; position:relative;">
                    <label style="display:block; font-weight:600; font-size:0.875rem; color:#1a1a1a; margin-bottom:0.25rem;"><i class="fas fa-lock" style="color:#f47b20;"></i> Contraseña</label>
                    <input type="password" id="password" style="width:100%; padding:0.75rem 1rem; background:#f9fafb; border:2px solid #e5e7eb; border-radius:8px; font-size:1rem; padding-right:3rem;" placeholder="••••••••" required>
                    <button type="button" id="togglePassword" style="position:absolute; right:12px; bottom:10px; background:none; border:none; color:#9ca3af; cursor:pointer; font-size:1.2rem;">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <button type="submit" style="width:100%; padding:0.875rem; background:linear-gradient(135deg,#f47b20,#f69b4c); color:white; border:none; border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer;">Ingresar al Campus</button>
            </form>
            <div style="text-align:center; padding-top:1rem; font-size:0.75rem; color:#9ca3af;">
                <p>Usuarios de prueba:</p>
                <p><strong>admin</strong> / admin123 | <strong>dirigente</strong> / dirigente123 | <strong>delegado</strong> / delegado123</p>
            </div>
        </div>
    </div>

    <!-- CHAT WIDGET -->
    <div class="chat-widget" id="chatWidget" style="display:none;">
        <button class="chat-btn" id="chatBtn"><i class="fas fa-robot" style="font-size:1.8rem; color:white;"></i></button>
        <div class="chat-window hidden" id="chatWindow">
            <div class="chat-header">
                <div class="chat-header-info"><div class="chat-avatar"><i class="fas fa-robot"></i></div><div><h3>Asistente AOMA</h3><span class="chat-status"><span class="status-dot online"></span>En línea</span></div></div>
                <button class="chat-close" id="chatClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <form class="chat-form" id="chatForm">
                <input type="text" id="chatInput" placeholder="Escribe tu consulta...">
                <button type="submit"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
